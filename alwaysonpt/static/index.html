<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlwaysOnPT — Clinical EMG Analysis</title>
<style>
  :root {
    --bg:        #0b0f14;
    --surface:   #131820;
    --surface2:  #1a2030;
    --border:    #232d3d;
    --text:      #c8ced8;
    --text-dim:  #6b7a8d;
    --accent:    #3b9eff;
    --accent-dim:#2a6fba;
    --warn:      #e85454;
    --warn-dim:  #a63a3a;
    --code-bg:   #0e1218;
    --green:     #2ecc71;
    --orange:    #e6983a;
    --purple:    #8b7bd4;
    --cyan:      #50c8c8;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.5;
    height: 100vh; overflow: hidden;
  }

  /* --- Top Bar --- */
  .topbar {
    display: flex; align-items: center; gap: 16px;
    padding: 10px 20px; border-bottom: 1px solid var(--border);
    background: var(--surface); height: 48px;
  }
  .topbar-brand { font-size: 14px; font-weight: 700; color: var(--accent); letter-spacing: -0.3px; }
  .topbar-sep { width: 1px; height: 20px; background: var(--border); }
  .topbar-meta { font-size: 12px; color: var(--text-dim); display: flex; gap: 12px; }
  .topbar-meta span { display: flex; align-items: center; gap: 4px; }
  .topbar-status {
    margin-left: auto; display: flex; align-items: center; gap: 8px;
    font-size: 11px; color: var(--text-dim);
  }
  .topbar-dot {
    width: 7px; height: 7px; border-radius: 50%; background: var(--border);
  }
  .topbar-dot.active { background: var(--green); }
  .topbar-dot.running { background: var(--orange); animation: blink 1s ease infinite; }
  @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

  /* --- Source Tabs --- */
  .source-tabs {
    display: flex; gap: 0; border-bottom: 1px solid var(--border);
    background: var(--surface); padding: 0 20px;
  }
  .source-tab {
    padding: 8px 16px; font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--text-dim); cursor: pointer; border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s; user-select: none;
  }
  .source-tab:hover { color: var(--text); }
  .source-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .source-tab .tab-badge {
    font-size: 9px; padding: 1px 5px; border-radius: 8px;
    background: var(--surface2); margin-left: 6px; vertical-align: middle;
  }
  .source-tab.active .tab-badge { background: rgba(59,158,255,0.15); color: var(--accent); }

  /* --- Split Layout --- */
  .split {
    display: grid; grid-template-columns: 1fr 1fr;
    height: calc(100vh - 48px - 36px); overflow: hidden;
  }
  @media (max-width: 900px) {
    .split { grid-template-columns: 1fr; }
    .panel-right { border-left: none !important; border-top: 1px solid var(--border); }
  }

  .panel-left {
    overflow-y: auto; padding: 16px 20px;
    border-right: 1px solid var(--border);
  }
  .panel-right {
    display: flex; flex-direction: column; overflow: hidden;
    background: var(--surface);
  }

  /* --- Sections --- */
  .section { margin-bottom: 16px; }
  .section-label {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1px; color: var(--text-dim); margin-bottom: 8px;
  }

  /* --- Controls --- */
  .controls { display: flex; flex-wrap: wrap; gap: 8px; align-items: end; }
  .field { display: flex; flex-direction: column; gap: 3px; }
  .field label {
    font-size: 10px; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  select {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 4px;
    color: var(--text); padding: 6px 10px; font-size: 12px; font-family: inherit;
    min-width: 110px; outline: none;
  }
  select:focus { border-color: var(--accent); }
  button {
    background: var(--accent); color: #fff; border: none; border-radius: 4px;
    padding: 6px 14px; font-size: 12px; font-weight: 600; font-family: inherit;
    cursor: pointer; transition: opacity 0.15s; white-space: nowrap;
  }
  button:hover { opacity: 0.85; }
  button:disabled { opacity: 0.3; cursor: not-allowed; }
  button.secondary {
    background: transparent; color: var(--text-dim); border: 1px solid var(--border);
  }
  button.secondary:hover { color: var(--text); border-color: var(--text-dim); }

  /* --- Waveform --- */
  .canvas-wrap {
    background: var(--code-bg); border-radius: 6px; padding: 8px;
    border: 1px solid var(--border); position: relative; overflow: hidden;
  }
  canvas { width: 100%; display: block; }
  .recording-bar {
    display: flex; align-items: center; gap: 8px;
    margin-top: 8px; font-size: 11px;
  }
  .rec-timer {
    font-family: 'SF Mono', Menlo, Consolas, monospace;
    color: var(--text); font-size: 12px; font-weight: 600;
  }
  .rec-label { color: var(--text-dim); }
  .rec-detail { color: var(--text-dim); font-size: 11px; margin-left: auto; }

  .segment-bar {
    display: flex; margin-top: 8px; border-radius: 3px;
    overflow: hidden; height: 22px; cursor: pointer;
  }
  .seg-block {
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 700; letter-spacing: 0.4px;
    text-transform: uppercase; color: #fff; transition: opacity 0.15s;
  }
  .seg-block:hover { opacity: 0.7; }
  .seg-block.selected { outline: 2px solid #fff; outline-offset: -2px; z-index: 1; }
  .seg-stance  { background: var(--cyan); }
  .seg-swing   { background: var(--accent); }
  .seg-standing { background: var(--orange); }
  .seg-sitting  { background: var(--purple); }

  .waveform-meta {
    display: flex; justify-content: space-between; flex-wrap: wrap;
    margin-top: 6px; font-size: 11px; color: var(--text-dim); gap: 6px;
  }
  .seg-legend {
    display: flex; gap: 12px; margin-top: 6px; font-size: 10px; color: var(--text-dim);
  }
  .seg-legend .dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 2px;
    margin-right: 3px; vertical-align: middle;
  }

  .hidden { display: none !important; }

  /* --- Multi-channel Grid --- */
  .channel-grid {
    display: grid; gap: 4px; margin-top: 8px;
  }
  .channel-grid.cols-1 { grid-template-columns: 1fr; }
  .channel-grid.cols-2 { grid-template-columns: 1fr 1fr; }
  .channel-grid.cols-4 { grid-template-columns: 1fr 1fr 1fr 1fr; }
  .channel-card {
    background: var(--code-bg); border: 1px solid var(--border);
    border-radius: 4px; padding: 4px 6px; overflow: hidden;
  }
  .channel-label {
    font-size: 9px; font-weight: 600; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 2px;
  }

  /* --- Analyze Bar --- */
  .analyze-bar {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 0; border-top: 1px solid var(--border);
    margin-top: 8px;
  }
  .spinner {
    width: 14px; height: 14px;
    border: 2px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status-text { font-size: 11px; color: var(--text-dim); }

  /* --- Result Card --- */
  .result-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 14px 16px; margin-top: 12px;
  }
  .result-header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 8px; }
  .result-class { font-size: 18px; font-weight: 700; color: var(--accent); text-transform: uppercase; }
  .result-conf-badge {
    font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 10px;
    background: rgba(59,158,255,0.12); color: var(--accent);
    font-family: 'SF Mono', Menlo, Consolas, monospace;
  }
  .narrative { font-size: 12px; color: var(--text-dim); line-height: 1.5; }
  .verdict {
    margin-top: 10px; padding: 8px 12px; border-radius: 4px;
    font-size: 12px; font-weight: 600;
  }
  .verdict.correct { background: rgba(46,204,113,0.1); border: 1px solid var(--green); color: var(--green); }
  .verdict.incorrect { background: rgba(232,84,84,0.1); border: 1px solid var(--warn); color: var(--warn); }
  .plots-section { margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }
  .plots-section img { width: 100%; border-radius: 4px; border: 1px solid var(--border); }
  .meta-row {
    display: flex; gap: 16px; margin-top: 10px; padding-top: 8px;
    border-top: 1px solid var(--border); font-size: 11px; color: var(--text-dim);
  }

  /* --- Trace Panel (right side) --- */
  .trace-header {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    background: var(--surface); flex-shrink: 0;
  }
  .trace-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-dim); }
  .trace-stats { margin-left: auto; font-size: 11px; color: var(--text-dim); font-family: 'SF Mono', Menlo, Consolas, monospace; }
  .trace-scroll {
    flex: 1; overflow-y: auto; padding: 12px 16px;
  }
  .trace-empty {
    display: flex; align-items: center; justify-content: center;
    height: 100%; color: var(--text-dim); font-size: 12px;
  }

  /* --- Trace Steps --- */
  .trace-step {
    display: flex; gap: 10px; margin-bottom: 2px;
    opacity: 0; transform: translateY(6px);
    transition: opacity 0.3s ease, transform 0.3s ease;
  }
  .trace-step.visible { opacity: 1; transform: translateY(0); }

  .step-num {
    width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; margin-top: 1px;
    font-family: 'SF Mono', Menlo, Consolas, monospace;
    border: 1.5px solid var(--border); color: var(--text-dim);
    background: var(--bg);
  }
  .step-num.CODE_EXECUTION { border-color: var(--cyan); color: var(--cyan); }
  .step-num.OBSERVATION    { border-color: var(--accent); color: var(--accent); }
  .step-num.DECISION       { border-color: var(--orange); color: var(--orange); }
  .step-num.ERROR          { border-color: var(--warn); color: var(--warn); }

  .step-main { flex: 1; min-width: 0; }

  .step-row {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 0; cursor: pointer; user-select: none;
  }
  .step-row:hover .step-summary { color: var(--text); }
  .step-type {
    font-size: 9px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.5px; flex-shrink: 0;
  }
  .step-type.CODE_EXECUTION { color: var(--cyan); }
  .step-type.OBSERVATION    { color: var(--accent); }
  .step-type.DECISION       { color: var(--orange); }
  .step-type.ERROR          { color: var(--warn); }
  .step-summary {
    font-size: 12px; color: var(--text-dim); white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; flex: 1;
    transition: color 0.15s;
  }
  .step-dur {
    font-size: 10px; color: var(--text-dim); flex-shrink: 0;
    font-family: 'SF Mono', Menlo, Consolas, monospace;
  }
  .step-chevron {
    font-size: 10px; color: var(--text-dim); flex-shrink: 0;
    transition: transform 0.2s;
  }
  .step-chevron.open { transform: rotate(90deg); }

  .step-detail {
    max-height: 0; overflow: hidden;
    transition: max-height 0.3s ease;
  }
  .step-detail.open { max-height: 2000px; }
  .step-detail-inner { padding: 4px 0 10px 0; }

  .detail-code {
    background: var(--code-bg); border: 1px solid var(--border);
    border-radius: 4px; margin-bottom: 4px; overflow: hidden;
  }
  .detail-code-bar {
    padding: 3px 10px; font-size: 9px; text-transform: uppercase;
    letter-spacing: 0.4px; color: var(--text-dim);
    border-bottom: 1px solid var(--border); background: rgba(255,255,255,0.015);
  }
  .detail-code pre {
    font-size: 11px; font-family: 'SF Mono', Menlo, Consolas, monospace;
    color: #c0c8d4; padding: 8px 10px; white-space: pre-wrap;
    word-break: break-word; line-height: 1.45; overflow-y: auto;
    max-height: 240px; margin: 0;
  }
  .detail-code pre .kw { color: #ff7b72; }
  .detail-code pre .fn { color: #c9a0ff; }
  .detail-code pre .str { color: #a5d6ff; }
  .detail-code pre .cmt { color: #6b7a8d; font-style: italic; }
  .detail-code pre .num { color: #79c0ff; }

  .detail-output {
    border-radius: 4px; overflow: hidden;
    border: 1px solid rgba(80,200,200,0.15);
    background: rgba(80,200,200,0.03);
  }
  .detail-output-bar {
    padding: 3px 10px; font-size: 9px; text-transform: uppercase;
    letter-spacing: 0.4px; color: var(--cyan);
    border-bottom: 1px solid rgba(80,200,200,0.1);
  }
  .detail-output pre {
    font-size: 11px; font-family: 'SF Mono', Menlo, Consolas, monospace;
    color: var(--cyan); padding: 8px 10px; white-space: pre-wrap;
    word-break: break-word; line-height: 1.45; overflow-y: auto;
    max-height: 200px; margin: 0;
  }

  .detail-error {
    border-radius: 4px; padding: 6px 10px;
    border: 1px solid rgba(232,84,84,0.2);
    background: rgba(232,84,84,0.04);
    font-size: 11px; font-family: 'SF Mono', Menlo, Consolas, monospace;
    color: #ff9b9b; line-height: 1.4;
  }

  .detail-decision {
    border: 1px solid rgba(230,152,58,0.2); border-radius: 4px;
    padding: 10px 14px; background: rgba(230,152,58,0.04);
  }
  .detail-decision-class {
    font-size: 16px; font-weight: 700; color: var(--orange); text-transform: uppercase;
  }
  .detail-decision-conf { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
  .detail-decision-narrative {
    font-size: 12px; color: var(--text); line-height: 1.5;
    margin-top: 6px; padding-top: 6px; border-top: 1px solid rgba(230,152,58,0.12);
  }

  .detail-observation {
    font-size: 12px; color: var(--text); line-height: 1.5;
    padding: 8px 12px; background: var(--surface2);
    border-radius: 4px; border: 1px solid var(--border);
  }
</style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <span class="topbar-brand">AlwaysOnPT</span>
  <div class="topbar-sep"></div>
  <div class="topbar-meta" id="topbarMeta">
    <span>Clinical Biosignal Analysis</span>
  </div>
  <div class="topbar-status" id="topbarStatus">
    <div class="topbar-dot" id="statusDot"></div>
    <span id="statusLabel">Ready</span>
  </div>
</div>

<!-- Source Tabs -->
<div class="source-tabs" id="sourceTabs"></div>

<!-- Split Layout -->
<div class="split">

  <!-- Left Panel: Signal -->
  <div class="panel-left">

    <!-- ===== KNEE EMG SOURCE ===== -->
    <div id="src-knee_emg">
      <div class="section">
        <div class="section-label">Session</div>
        <div class="controls">
          <div class="field">
            <label>Subject</label>
            <select id="subject"></select>
          </div>
          <div class="field">
            <label>Exercise</label>
            <select id="exercise"></select>
          </div>
          <div class="field">
            <label>Task</label>
            <select id="taskType">
              <option value="emg_classification">EMG Classification</option>
              <option value="open_analysis">Open Analysis</option>
            </select>
          </div>
          <button id="loadBtn" onclick="startSession()">Load</button>
          <button class="secondary" id="randomBtn" onclick="randomSession()">Random</button>
        </div>
      </div>

      <div class="section hidden" id="waveform-section">
        <div class="section-label" id="waveformTitle">Signal</div>
        <div class="canvas-wrap">
          <canvas id="emgCanvas" height="120"></canvas>
        </div>
        <div class="canvas-wrap" style="margin-top: 4px;">
          <canvas id="gonioCanvas" height="60"></canvas>
        </div>
        <div class="recording-bar" id="recordingBar">
          <span class="rec-timer" id="recTimer">0.0s</span>
          <span class="rec-label" id="recLabel"></span>
          <span class="rec-detail" id="recDetail"></span>
        </div>
        <div id="segBar" class="segment-bar hidden"></div>
        <div class="seg-legend hidden" id="segLegend"></div>
        <div class="waveform-meta hidden" id="wfMetaWrap">
          <span id="wfMeta"></span>
          <span id="wfSel"></span>
        </div>
      </div>

      <div class="hidden" id="analyze-section">
        <div class="analyze-bar">
          <button id="analyzeBtn" onclick="runAnalysis()">Analyze Segment</button>
          <button class="secondary" id="analyzeAllBtn" onclick="runAnalysis(true)">Full Recording</button>
          <div class="spinner hidden" id="spinner"></div>
          <span class="status-text" id="statusText"></span>
        </div>
      </div>
    </div>

    <!-- ===== LIVE SENSOR SOURCE ===== -->
    <div id="src-live_sensor" class="hidden">
      <div class="section">
        <div class="section-label">Live Sensor Recording</div>
        <div class="controls">
          <div class="field">
            <label>Recording</label>
            <select id="liveRecSelect"></select>
          </div>
          <div class="field">
            <label>Task</label>
            <select id="liveTaskType">
              <option value="emg_classification">EMG Classification</option>
              <option value="open_analysis">Open Analysis</option>
            </select>
          </div>
          <button id="liveLoadBtn" onclick="loadLiveRecording()">Load</button>
        </div>
      </div>

      <div class="section hidden" id="live-waveform-section">
        <div class="section-label" id="liveWaveformTitle">Sensor Data</div>
        <div id="liveChannelGrid" class="channel-grid cols-2"></div>
        <div class="recording-bar">
          <span class="rec-timer" id="liveRecTimer">0.0s</span>
          <span class="rec-label" id="liveRecLabel"></span>
          <span class="rec-detail" id="liveRecDetail"></span>
        </div>
      </div>

      <div class="hidden" id="live-analyze-section">
        <div class="analyze-bar">
          <button id="liveAnalyzeBtn" onclick="runLiveAnalysis()">Analyze Recording</button>
          <div class="spinner hidden" id="liveSpinner"></div>
          <span class="status-text" id="liveStatusText"></span>
        </div>
      </div>
    </div>

    <!-- ===== MULTICHANNEL SOURCE ===== -->
    <div id="src-multichannel" class="hidden">
      <div class="section">
        <div class="section-label">16-Channel EMG</div>
        <div class="controls">
          <div class="field">
            <label>Recording</label>
            <select id="multiRecSelect"></select>
          </div>
          <div class="field">
            <label>Task</label>
            <select id="multiTaskType">
              <option value="emg_classification">EMG Classification</option>
              <option value="open_analysis">Open Analysis</option>
            </select>
          </div>
          <button id="multiLoadBtn" onclick="loadMultiRecording()">Load</button>
        </div>
      </div>

      <div class="section hidden" id="multi-waveform-section">
        <div class="section-label" id="multiWaveformTitle">16-Channel EMG Array</div>
        <div id="multiChannelGrid" class="channel-grid cols-4"></div>
        <div class="recording-bar">
          <span class="rec-timer" id="multiRecTimer">0.0s</span>
          <span class="rec-label" id="multiRecLabel"></span>
          <span class="rec-detail" id="multiRecDetail"></span>
        </div>
      </div>

      <div class="hidden" id="multi-analyze-section">
        <div class="analyze-bar">
          <button id="multiAnalyzeBtn" onclick="runMultiAnalysis()">Analyze Recording</button>
          <div class="spinner hidden" id="multiSpinner"></div>
          <span class="status-text" id="multiStatusText"></span>
        </div>
      </div>
    </div>

    <!-- Result (shared) -->
    <div class="result-card hidden" id="result-card">
      <div class="section-label">Result</div>
      <div class="result-header">
        <span class="result-class" id="resultClass"></span>
        <span class="result-conf-badge" id="resultConf"></span>
      </div>
      <div class="narrative" id="resultNarrative"></div>
      <div id="verdictBox"></div>
      <div class="plots-section" id="plotsSection"></div>
      <div class="meta-row" id="metaRow"></div>
    </div>

  </div>

  <!-- Right Panel: Agent Trace -->
  <div class="panel-right">
    <div class="trace-header">
      <span class="trace-title">Agent Trace</span>
      <span class="trace-stats" id="traceStats"></span>
    </div>
    <div class="trace-scroll" id="traceScroll">
      <div id="traceContainer">
        <div class="trace-empty" id="traceEmpty">Load a session and run analysis to see agent reasoning</div>
      </div>
    </div>
  </div>

</div>

<script>
const API = '';
let activeSource = 'knee_emg';

// --- Knee EMG state ---
let subjectData = {};
let recordingData = null;
let selectedSegIdx = 0;
let animFrameId = null;
let analysisStartTime = 0;

// --- Live sensor state ---
let liveRecordings = [];
let liveData = null;

// --- Multichannel state ---
let multiRecordings = [];
let multiData = null;

const CH_COLORS = [
  '#50c8c8','#3b9eff','#8b7bd4','#e6983a','#2ecc71','#e85454','#f1c40f','#e67e22',
  '#1abc9c','#9b59b6','#3498db','#e74c3c','#2ecc71','#f39c12','#16a085','#c0392b',
];

// =============================================================================
// INIT
// =============================================================================

async function init() {
  const srcRes = await fetch(`${API}/api/sources`);
  const srcData = await srcRes.json();
  buildSourceTabs(srcData.sources);

  // Load knee EMG subjects
  try {
    const res = await fetch(`${API}/api/subjects`);
    const data = await res.json();
    subjectData = data.subjects;
    const subjectSel = document.getElementById('subject');
    subjectSel.innerHTML = '';
    for (const sid of Object.keys(subjectData).sort((a,b) => +a - +b)) {
      const opt = document.createElement('option');
      opt.value = sid; opt.textContent = `S${sid}`;
      subjectSel.appendChild(opt);
    }
    updateExercises();

function animateStreaming(onDone) {
  const emgData = recordingData.emg_downsampled;
  const gonioData = recordingData.gonio_downsampled;
  const durationS = recordingData.duration_s;
  const animDurationMs = Math.min(4000, Math.max(1500, durationS * 200));
  const startTime = performance.now();
  const timerEl = document.getElementById('recTimer');

  function frame(now) {
    const progress = Math.min(1, (now - startTime) / animDurationMs);
    timerEl.textContent = (progress * durationS).toFixed(1) + 's';
    const pts = Math.floor(emgData.length * progress);
    drawStreamFrame(document.getElementById('emgCanvas'), emgData, pts, 120, '#50c8c8', 'EMG');
    drawStreamFrame(document.getElementById('gonioCanvas'), gonioData, pts, 60, '#8b7bd4', 'Gonio');
    if (progress < 1) { animFrameId = requestAnimationFrame(frame); }
    else { animFrameId = null; drawFinalWaveforms(); if (onDone) onDone(); }
  }
  animFrameId = requestAnimationFrame(frame);
}

function drawStreamFrame(canvas, data, pts, h, color, label) {
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr; canvas.height = h * dpr;
  canvas.style.height = h + 'px';
  const ctx = canvas.getContext('2d'); ctx.scale(dpr, dpr);
  const W = rect.width;
  ctx.strokeStyle = '#1a2030'; ctx.lineWidth = 1;
  for (let y = 0; y < h; y += h / 4) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
  if (pts < 2) return;
  const absMax = Math.max(...data.map(Math.abs)) || 1;
  ctx.beginPath(); ctx.strokeStyle = color; ctx.lineWidth = 1;
  for (let i = 0; i < pts; i++) {
    const x = (i / data.length) * W;
    const y = h / 2 - (data[i] / absMax) * (h / 2 - 4);
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();
  ctx.fillStyle = '#6b7a8d'; ctx.font = '9px system-ui'; ctx.fillText(label, 4, 10);
}

function drawFinalWaveforms() {
  drawSignalStatic('emgCanvas', recordingData.emg_downsampled, 120, '#50c8c8', 'EMG');
  drawSignalStatic('gonioCanvas', recordingData.gonio_downsampled, 60, '#8b7bd4', 'Gonio');
}

function drawSignalStatic(canvasId, data, h, color, label) {
  const canvas = document.getElementById(canvasId);
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr; canvas.height = h * dpr;
  canvas.style.height = h + 'px';
  const ctx = canvas.getContext('2d'); ctx.scale(dpr, dpr);
  const W = rect.width;
  ctx.strokeStyle = '#1a2030'; ctx.lineWidth = 1;
  for (let y = 0; y < h; y += h / 4) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
  const absMax = Math.max(...data.map(Math.abs)) || 1;
  ctx.beginPath(); ctx.strokeStyle = color; ctx.lineWidth = 1;
  for (let i = 0; i < data.length; i++) {
    const x = (i / data.length) * W;
    const y = h / 2 - (data[i] / absMax) * (h / 2 - 4);
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();
  if (recordingData && recordingData.segments && recordingData.segments.length > 0) {
    const seg = recordingData.segments[selectedSegIdx];
    if (seg) {
      const total = recordingData.n_samples;
      const x0 = (seg.start_idx / total) * W, x1 = (seg.end_idx / total) * W;
      ctx.fillStyle = 'rgba(59,158,255,0.06)'; ctx.fillRect(x0, 0, x1 - x0, h);
      ctx.strokeStyle = 'rgba(59,158,255,0.3)'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(x0, 0); ctx.lineTo(x0, h); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x1, 0); ctx.lineTo(x1, h); ctx.stroke();
    }
  }
  ctx.fillStyle = '#6b7a8d'; ctx.font = '9px system-ui'; ctx.fillText(label, 4, 10);
}

function buildSegmentBar() {
  const bar = document.getElementById('segBar'); bar.innerHTML = '';
  const segs = recordingData.segments;
  if (!segs.length) { bar.innerHTML = '<div style="color:var(--text-dim);font-size:11px;padding:3px;">No segments</div>'; return; }
  const total = recordingData.n_samples;
  const classes = new Set();
  segs.forEach((seg, i) => {
    classes.add(seg.motion_class);
    const pct = (seg.end_idx - seg.start_idx) / total * 100;
    const block = document.createElement('div');
    block.className = `seg-block seg-${seg.motion_class}` + (i === selectedSegIdx ? ' selected' : '');
    block.style.width = pct + '%';
    block.textContent = seg.motion_class.slice(0, 3);
    block.title = `Seg ${i}: ${seg.motion_class} (${seg.duration_s}s)`;
    block.onclick = () => selectSegment(i);
    bar.appendChild(block);
  });
  const legend = document.getElementById('segLegend');
  const colors = { stance:'var(--cyan)', swing:'var(--accent)', standing:'var(--orange)', sitting:'var(--purple)' };
  legend.innerHTML = '';
  for (const cls of classes) {
    legend.innerHTML += `<span><span class="dot" style="background:${colors[cls]||'var(--text-dim)'}"></span>${cls}</span>`;
  }
}

function selectSegment(idx) { selectedSegIdx = idx; buildSegmentBar(); drawFinalWaveforms(); updateSelLabel(); }

  document.getElementById('wfSel').textContent = seg

function drawMiniChannel(canvasId, data, h, color, label) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr; canvas.height = h * dpr;
  canvas.style.height = h + 'px';
  const ctx = canvas.getContext('2d'); ctx.scale(dpr, dpr);
  const W = rect.width;

  ctx.strokeStyle = '#1a2030'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, h/2); ctx.lineTo(W, h/2); ctx.stroke();

  if (!data || data.length < 2) return;
  const absMax = Math.max(...data.map(Math.abs)) || 1;
  ctx.beginPath(); ctx.strokeStyle = color; ctx.lineWidth = 1;
  for (let i = 0; i < data.length; i++) {
    const x = (i / data.length) * W;
    const y = h / 2 - (data[i] / absMax) * (h / 2 - 2);
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();
}

async function streamAnalysis(body, groundTruth, container, spinner, status, stepCount) {
  status.textContent = 'Agent running…';

  const res = await fetch(`${API}/api/analyze/stream`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });

  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split('\n');
    buffer = lines.pop();

    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      let parsed;
      try { parsed = JSON.parse(line.slice(6)); } catch { continue; }
      if (parsed.event === 'step') {
        stepCount++;
        const elapsed = ((Date.now() - analysisStartTime) / 1000).toFixed(0);
        status.textContent = `Step ${stepCount}`;
        document.getElementById('traceStats').textContent = `${stepCount} steps · ${elapsed}s`;
        appendStep(container, parsed.step, stepCount);
      } else if (parsed.event === 'done') {
        spinner.classList.add('hidden');
        const elapsed = ((Date.now() - analysisStartTime) / 1000).toFixed(1);
        status.textContent = `Done · ${elapsed}s`;
        document.getElementById('traceStats').textContent = `${parsed.result.n_steps} steps · ${elapsed}s`;
        setTopbar('idle');
        showResult(parsed.result, groundTruth);
      } else if (parsed.event === 'error') {
        spinner.classList.add('hidden');
        status.textContent = 'Error: ' + parsed.message;
        setTopbar('idle');
      }
    }
  }
}

function resetTrace() {
  const container = document.getElementById('traceContainer');
  container.innerHTML = '<div class="trace-empty" id="traceEmpty">Load a session and run analysis to see agent reasoning</div>';
  document.getElementById('traceStats').textContent = '';
}

function setTopbar(state, text) {
  const dot = document.getElementById('statusDot');
  const label = document.getElementById('statusLabel');
  const meta = document.getElementById('topbarMeta');
  dot.className = 'topbar-dot' + (state === 'running' ? ' running' : state === 'idle' ? ' active' : '');
  label.textContent = state === 'running' ? 'Analyzing…' : 'Ready';
  if (text) meta.innerHTML = `<span>${text}</span>`;
}

function appendStep(container, step, idx) {
  const el = document.createElement('div');
  el.className = 'trace-step';
  const dur = step.duration_ms > 0 ? fmtDur(step.duration_ms) : '';
  const stepId = `s${idx}-${Date.now()}`;
  const summary = getStepSummary(step);
  const isDecision = step.type === 'DECISION';

  let detailHtml = '';
  if (step.type === 'CODE_EXECUTION') {
    const outputRaw = (step.evidence && step.evidence.length) ? step.evidence.join('\n') : '';
    detailHtml = `
      <div class="detail-code"><div class="detail-code-bar">python</div><pre>${hlPy(step.content)}</pre></div>
      ${outputRaw ? `<div class="detail-output"><div class="detail-output-bar">output</div><pre>${esc(fmtDict(outputRaw.trim()))}</pre></div>` : ''}
    `;
  } else if (step.type === 'ERROR') {
    const errMsg = (step.evidence && step.evidence.length) ? step.evidence.join('\n') : '';
    detailHtml = `
      <div class="detail-code"><div class="detail-code-bar">python</div><pre>${hlPy(step.content)}</pre></div>
      <div class="detail-error">${esc(extractErr(errMsg))}</div>
    `;
  } else if (step.type === 'DECISION') {
    const parts = parseDec(step.content);
    const narrative = (step.evidence && step.evidence.length) ? step.evidence[0] : '';
    detailHtml = `
      <div class="detail-decision">
        <div class="detail-decision-class">${esc(parts.value)}</div>
        <div class="detail-decision-conf">${parts.confidence}</div>
        ${narrative ? `<div class="detail-decision-narrative">${esc(narrative)}</div>` : ''}
      </div>
    `;
  } else {
    detailHtml = `<div class="detail-observation">${esc(step.content)}</div>`;
  }

  el.innerHTML = `
    <div class="step-num ${step.type}">${idx}</div>
    <div class="step-main">
      <div class="step-row" onclick="toggleStep('${stepId}')">
        <span class="step-type ${step.type}">${stepLabel(step.type)}</span>
        <span class="step-summary">${esc(summary)}</span>
        ${dur ? `<span class="step-dur">${dur}</span>` : ''}
        <span class="step-chevron ${isDecision ? 'open' : ''}" id="${stepId}-chev">&#9654;</span>
      </div>
      <div class="step-detail ${isDecision ? 'open' : ''}" id="${stepId}">
        <div class="step-detail-inner">${detailHtml}</div>
      </div>
    </div>
  `;

  container.appendChild(el);
  requestAnimationFrame(() => el.classList.add('visible'));
  document.getElementById('traceScroll').scrollTop = document.getElementById('traceScroll').scrollHeight;
}

function toggleStep(id) {
  const detail = document.getElementById(id);
  const chev = document.getElementById(id + '-chev');
  if (!detail) return;
  detail.classList.toggle('open');
  if (chev) chev.classList.toggle('open');
}

function getStepSummary(step) {
  if (step.type === 'CODE_EXECUTION') {
    const lines = step.content.split('\n');
    for (const l of lines) {
      const t = l.trim();
      if (t.startsWith('#') && t.length > 2) return t.replace(/^#+\s*/, '').replace(/^Step \d+[:\s]*/i, '');
    }
    for (const l of lines) {
      const t = l.trim();
      if (t && !t.startsWith('#') && !t.startsWith('import')) return t.length > 60 ? t.slice(0, 60) + '…' : t;
    }
    return 'Code execution';
  }
  if (step.type === 'ERROR') {
    const errMsg = (step.evidence && step.evidence.length) ? step.evidence.join('\n') : '';
    return extractErr(errMsg) || 'Error';
  }
  if (step.type === 'DECISION') {
    const p = parseDec(step.content);
    return `${p.value} (${p.confidence})`;
  }
  return step.content.length > 80 ? step.content.slice(0, 80) + '…' : step.content;
}

function stepLabel(type) {
  const map = { CODE_EXECUTION: 'exec', ERROR: 'error', DECISION: 'result', OBSERVATION: 'note', TOOL_CALL: 'tool' };
  return map[type] || type.toLowerCase();
}

function fmtDur(ms) { return ms < 1000 ? Math.round(ms) + 'ms' : (ms / 1000).toFixed(1) + 's'; }

function hlPy(code) {
  let s = esc(code);
  s = s.replace(/(#[^\n]*)/g, '<span class="cmt">$1</span>');
  s = s.replace(/("""[\s\S]*?"""|'''[\s\S]*?'''|"(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*')/g, '<span class="str">$1</span>');
  const kws = ['import','from','def','class','return','if','elif','else','for','while','in','not','and','or','try','except','finally','with','as','pass','break','continue','raise','True','False','None','print','lambda'];
  s = s.replace(new RegExp('\\b(' + kws.join('|') + ')\\b', 'g'), '<span class="kw">$1</span>');
  s = s.replace(/\b([a-zA-Z_]\w*)\s*\(/g, '<span class="fn">$1</span>(');
  s = s.replace(/\b(\d+\.?\d*(?:e[+-]?\d+)?)\b/g, '<span class="num">$1</span>');
  return s;
}

function fmtDict(text) {
  const lines = text.split('\n'), result = [];
  for (const line of lines) {
    const t = line.trim();
    if (t.startsWith('{') && t.endsWith('}') && t.includes(':')) {
      try {
        const j = t.replace(/'/g, '"').replace(/True/g, 'true').replace(/False/g, 'false').replace(/None/g, 'null');
        result.push(JSON.stringify(JSON.parse(j), null, 2));
        continue;
      } catch {}
    }
    result.push(line);
  }
  return result.join('\n');
}

function parseDec(content) {
  const m = content.match(/^(\w+)=(.+?)\s*\(confidence:\s*([\d.]+)\)$/);
  if (m) return { key: m[1], value: m[2], confidence: Math.round(parseFloat(m[3]) * 100) + '%' };
  return { key: '', value: content, confidence: '' };
}

function extractErr(msg) {
  const lines = msg.split('\n');
  for (let i = lines.length - 1; i >= 0; i--) {
    const l = lines[i].trim();
    if (l.match(/^\w*(Error|Exception):/)) return l;
  }
  for (let i = lines.length - 1; i >= 0; i--) { if (lines[i].trim()) return lines[i].trim(); }
  return msg;
}

function showResult(data, groundTruth) {
  show('result-card');
  document.getElementById('resultClass').textContent = data.classification || '—';
  const conf = Math.round((data.confidence || 0) * 100);
  document.getElementById('resultConf').textContent = conf + '%';
  document.getElementById('resultNarrative').textContent = data.clinical_narrative || 'No narrative.';

  const box = document.getElementById('verdictBox');
  if (groundTruth) {
    const predicted = (data.classification || '').toLowerCase().trim();
    const truth = (groundTruth || '').toLowerCase().trim();
    const gaitPhases = ['stance', 'swing'];
    const match = predicted === truth || predicted.includes(truth) || truth.includes(predicted)
      || (truth === 'gait' && gaitPhases.includes(predicted));
    const label = (truth === 'gait' && gaitPhases.includes(predicted))
      ? `CORRECT (gait phase: ${predicted})`
      : match ? 'CORRECT' : 'MISMATCH';
    box.innerHTML = `<div class="verdict ${match ? 'correct' : 'incorrect'}">
      ${label} — truth: <strong>${groundTruth}</strong>, predicted: <strong>${data.classification || '—'}</strong>
    </div>`;
  } else {
    box.innerHTML = '';
  }

  const plotsEl = document.getElementById('plotsSection'); plotsEl.innerHTML = '';
  if (data.plot_urls && data.plot_urls.length) {
    for (const url of data.plot_urls) { const img = document.createElement('img'); img.src = url; plotsEl.appendChild(img); }
  }
  document.getElementById('metaRow').innerHTML = `
    <span>Steps: ${data.n_steps || 0}</span>
    <span>Record: ${data.segment_id || '—'}</span>
  `;
}

function show(id) { document.getElementById(id).classList.remove('hidden'); }
function hide(id) { document.getElementById(id).classList.add('hidden'); }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

init();
</script>
